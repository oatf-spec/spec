- name: "N-001 multiple unnamed phases get names phase-1, phase-2, phase-3"
  id: NORM-001g
  input: |
    oatf: "0.1"
    attack:
      id: OATF-TEST-001
      severity: high
      execution:
        mode: mcp_server
        phases:
          - state:
              tools:
                - name: "tool-a"
                  description: "Tool A"
            trigger:
              event: tools/call
          - state:
              tools:
                - name: "tool-b"
                  description: "Tool B"
            trigger:
              event: tools/call
          - description: "Terminal phase."
  expected: |
    oatf: "0.1"
    attack:
      id: OATF-TEST-001
      name: "Untitled"
      version: 1
      status: draft
      severity:
        level: high
        confidence: 50
      execution:
        actors:
          - name: default
            mode: mcp_server
            phases:
              - name: phase-1
                state:
                  tools:
                    - name: "tool-a"
                      description: "Tool A"
                trigger:
                  event: tools/call
                  count: 1
              - name: phase-2
                state:
                  tools:
                    - name: "tool-b"
                      description: "Tool B"
                trigger:
                  event: tools/call
                  count: 1
              - name: phase-3
                description: "Terminal phase."

