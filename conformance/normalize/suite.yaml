# =============================================================================
# OATF Conformance: Normalization Test Suite
# Tests SDK normalize() entry point against steps from §11.2.
#
# Every expected output is fully normalized — all rules applied simultaneously.
# Test runners compare the actual normalize() result against expected
# structurally, not as string equality.
# =============================================================================

# ---------------------------------------------------------------------------
# N-001: Default values
# ---------------------------------------------------------------------------

- name: "N-001 version: omitted version defaults to 1"
  id: NORM-001a
  input: |
    oatf: "0.1"
    attack:
      id: OATF-TEST-001
      name: "Test Attack"
      severity: high
      execution:
        mode: mcp_server
        state:
          tools: []
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected: |
    oatf: "0.1"
    attack:
      id: OATF-TEST-001
      name: "Test Attack"
      version: 1
      status: draft
      severity:
        level: high
        confidence: 50
      execution:
        actors:
          - name: default
            mode: mcp_server
            phases:
              - name: phase-1
                state:
                  tools: []
      indicators:
        - id: OATF-TEST-001-01
          protocol: mcp
          surface: tools/list
          target: "tools[*].description"
          pattern:
            target: "tools[*].description"
            condition:
              contains: "test"
      correlation:
        logic: any

