# =============================================================================
# OATF Conformance: parse_event_qualifier Primitive Tests
# Tests SDK parse_event_qualifier(event_string) per SDK spec §5.9.
# =============================================================================

- name: "Event with qualifier splits on first colon"
  id: PEQ-001
  input:
    event_string: "tools/call:calculator"
  expected:
    base: "tools/call"
    qualifier: "calculator"

- name: "Event without qualifier returns null qualifier"
  id: PEQ-002
  input:
    event_string: "tools/call"
  expected:
    base: "tools/call"
    qualifier: null

- name: "Event with multiple colons splits on first only"
  id: PEQ-003
  input:
    event_string: "tools/call:ns:tool_name"
  expected:
    base: "tools/call"
    qualifier: "ns:tool_name"

- name: "Notification event without qualifier"
  id: PEQ-004
  input:
    event_string: "notifications/tools/list_changed"
  expected:
    base: "notifications/tools/list_changed"
    qualifier: null

- name: "Resources read event without qualifier"
  id: PEQ-005
  input:
    event_string: "resources/read"
  expected:
    base: "resources/read"
    qualifier: null

- name: "Event with empty qualifier after colon"
  id: PEQ-006
  input:
    event_string: "tools/call:"
  expected:
    base: "tools/call"
    qualifier: ""
