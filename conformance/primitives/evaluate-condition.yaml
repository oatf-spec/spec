# =============================================================================
# OATF Conformance: evaluate_condition Primitive Tests
# Tests SDK evaluate_condition(condition, value) per SDK spec §5.3.
# =============================================================================

- name: "contains: substring match"
  id: COND-001
  input:
    condition:
      contains: "malicious"
    value: "this is malicious text"
  expected: true

- name: "contains: no match"
  id: COND-002
  input:
    condition:
      contains: "evil"
    value: "benign text"
  expected: false

- name: "contains: case sensitive — wrong case does not match"
  id: COND-003
  input:
    condition:
      contains: "Malicious"
    value: "malicious"
  expected: false

- name: "starts_with: prefix match"
  id: COND-004
  input:
    condition:
      starts_with: "attack"
    value: "attack vector"
  expected: true

- name: "starts_with: substring present but not at start"
  id: COND-005
  input:
    condition:
      starts_with: "attack"
    value: "the attack"
  expected: false

- name: "ends_with: suffix match"
  id: COND-006
  input:
    condition:
      ends_with: ".exe"
    value: "payload.exe"
  expected: true

- name: "regex: partial match (default behavior)"
  id: COND-007
  input:
    condition:
      regex: "id_rsa|passwd"
    value: "read /etc/passwd"
  expected: true

- name: "regex: anchored pattern does not match interior substring"
  id: COND-008
  input:
    condition:
      regex: "^admin$"
    value: "not admin here"
  expected: false

- name: "regex: unanchored pattern matches interior substring"
  id: COND-009
  input:
    condition:
      regex: "admin"
    value: "the admin panel"
  expected: true

- name: "any_of: value in list"
  id: COND-010
  input:
    condition:
      any_of:
        - "red"
        - "blue"
        - "green"
    value: "blue"
  expected: true

- name: "any_of: value not in list"
  id: COND-011
  input:
    condition:
      any_of:
        - "red"
        - "blue"
    value: "yellow"
  expected: false

- name: "gt: strictly greater"
  id: COND-012
  input:
    condition:
      gt: 10
    value: 15
  expected: true

- name: "gt: equal is not strictly greater"
  id: COND-013
  input:
    condition:
      gt: 10
    value: 10
  expected: false

- name: "lte: equal satisfies less-than-or-equal"
  id: COND-014
  input:
    condition:
      lte: 100
    value: 100
  expected: true

- name: "string operator on number: value coerced to JSON '42', no match"
  id: COND-015
  input:
    condition:
      contains: "x"
    value: 42
  expected: false

- name: "string operator on number: value coerced to JSON '42', matches"
  id: COND-022
  input:
    condition:
      contains: "42"
    value: 42
  expected: true

- name: "regex on object: value coerced to compact JSON, matches key"
  id: COND-023
  input:
    condition:
      regex: "account"
    value:
      account: "attacker-123"
  expected: true

- name: "regex on object: value coerced to compact JSON, matches value"
  id: COND-024
  input:
    condition:
      regex: "attacker-123"
    value:
      account: "attacker-123"
  expected: true

- name: "contains on object: coerced to compact JSON"
  id: COND-025
  input:
    condition:
      contains: '"account":'
    value:
      account: "attacker-123"
  expected: true

- name: "starts_with on array: coerced to compact JSON starting with '['"
  id: COND-026
  input:
    condition:
      starts_with: "["
    value:
      - "one"
      - "two"
  expected: true

- name: "regex on boolean: coerced to 'true'"
  id: COND-027
  input:
    condition:
      regex: "^true$"
    value: true
  expected: true

- name: "regex on null: coerced to 'null'"
  id: COND-028
  input:
    condition:
      regex: "^null$"
    value: null
  expected: true

- name: "numeric operator on string: type mismatch returns false"
  id: COND-029
  input:
    condition:
      gt: 10
    value: "not a number"
  expected: false

- name: "lt: strictly less"
  id: COND-017
  input:
    condition:
      lt: 10
    value: 5
  expected: true

- name: "gte: equal satisfies greater-than-or-equal"
  id: COND-018
  input:
    condition:
      gte: 10
    value: 10
  expected: true

- name: "equality: scalar condition matches via deep equality"
  id: COND-016
  input:
    condition: "expected_value"
    value: "expected_value"
  expected: true

- name: "multiple operators AND logic: contains + starts_with both satisfied"
  id: COND-019
  input:
    condition:
      contains: "passwd"
      starts_with: "Read"
    value: "Read /etc/passwd"
  expected: true

- name: "multiple operators AND logic: starts_with fails, contains passes"
  id: COND-020
  input:
    condition:
      contains: "passwd"
      starts_with: "Write"
    value: "Read /etc/passwd"
  expected: false

- name: "deep equality: array condition matches via deep equality"
  id: COND-021
  input:
    condition:
      - type: "object"
        properties:
          name:
            type: "string"
    value:
      - type: "object"
        properties:
          name:
            type: "string"
  expected: true
