# =============================================================================
# OATF Conformance: compute_verdict — "all" Logic Mode
# Tests SDK compute_verdict with correlation.logic: all per SDK spec §4.5.
#
# all: error takes precedence, then all matched → exploited,
#      mixed matched/not_matched → partial, all not_matched/skipped → not_exploited.
# =============================================================================

- name: "All matched — exploited"
  id: VERDICT-ALL-01
  input:
    correlation_logic: all
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: matched
        timestamp: null
  expected:
    result: exploited
    evaluation_summary:
      matched: 2
      not_matched: 0
      error: 0
      skipped: 0

- name: "One matched one not — partial"
  id: VERDICT-ALL-02
  input:
    correlation_logic: all
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: not_matched
        timestamp: null
  expected:
    result: partial
    evaluation_summary:
      matched: 1
      not_matched: 1
      error: 0
      skipped: 0

- name: "None matched — not_exploited"
  id: VERDICT-ALL-03
  input:
    correlation_logic: all
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: not_matched
        timestamp: null
      - indicator_id: "ind-2"
        result: not_matched
        timestamp: null
  expected:
    result: not_exploited
    evaluation_summary:
      matched: 0
      not_matched: 2
      error: 0
      skipped: 0

- name: "One error — error takes precedence"
  id: VERDICT-ALL-04
  input:
    correlation_logic: all
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: error
        timestamp: null
  expected:
    result: error
    evaluation_summary:
      matched: 1
      not_matched: 0
      error: 1
      skipped: 0

- name: "All skipped — error (no evaluation occurred)"
  id: VERDICT-ALL-05
  input:
    correlation_logic: all
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: skipped
        timestamp: null
      - indicator_id: "ind-2"
        result: skipped
        timestamp: null
  expected:
    result: error
    evaluation_summary:
      matched: 0
      not_matched: 0
      error: 0
      skipped: 2

- name: "One matched one skipped — partial"
  id: VERDICT-ALL-06
  input:
    correlation_logic: all
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: skipped
        timestamp: null
  expected:
    result: partial
    evaluation_summary:
      matched: 1
      not_matched: 0
      error: 0
      skipped: 1

- name: "Two matched + one error — error (error takes precedence over matched)"
  id: VERDICT-ALL-07
  input:
    correlation_logic: all
    indicators:
      - id: "ind-1"
      - id: "ind-2"
      - id: "ind-3"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: matched
        timestamp: null
      - indicator_id: "ind-3"
        result: error
        timestamp: null
  expected:
    result: error
    evaluation_summary:
      matched: 2
      not_matched: 0
      error: 1
      skipped: 0
