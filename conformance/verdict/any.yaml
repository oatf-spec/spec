# =============================================================================
# OATF Conformance: compute_verdict — "any" Logic Mode
# Tests SDK compute_verdict with correlation.logic: any per SDK spec §4.5.
#
# any: error takes precedence, then any matched → exploited, else not_exploited.
# =============================================================================

- name: "One matched indicator — exploited"
  id: VERDICT-ANY-01
  input:
    correlation_logic: any
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: not_matched
        timestamp: null
  expected:
    result: exploited
    evaluation_summary:
      matched: 1
      not_matched: 1
      error: 0
      skipped: 0

- name: "None matched — not_exploited"
  id: VERDICT-ANY-02
  input:
    correlation_logic: any
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: not_matched
        timestamp: null
      - indicator_id: "ind-2"
        result: not_matched
        timestamp: null
  expected:
    result: not_exploited
    evaluation_summary:
      matched: 0
      not_matched: 2
      error: 0
      skipped: 0

- name: "One error — error takes precedence"
  id: VERDICT-ANY-03
  input:
    correlation_logic: any
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: error
        timestamp: null
  expected:
    result: error
    evaluation_summary:
      matched: 1
      not_matched: 0
      error: 1
      skipped: 0

- name: "All skipped — error (no evaluation occurred)"
  id: VERDICT-ANY-04
  input:
    correlation_logic: any
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: skipped
        timestamp: null
      - indicator_id: "ind-2"
        result: skipped
        timestamp: null
  expected:
    result: error
    evaluation_summary:
      matched: 0
      not_matched: 0
      error: 0
      skipped: 2

- name: "Mixed skipped and matched — exploited"
  id: VERDICT-ANY-05
  input:
    correlation_logic: any
    indicators:
      - id: "ind-1"
      - id: "ind-2"
    verdicts:
      - indicator_id: "ind-1"
        result: skipped
        timestamp: null
      - indicator_id: "ind-2"
        result: matched
        timestamp: null
  expected:
    result: exploited
    evaluation_summary:
      matched: 1
      not_matched: 0
      error: 0
      skipped: 1

- name: "All three indicators matched — exploited"
  id: VERDICT-ANY-06
  input:
    correlation_logic: any
    indicators:
      - id: "ind-1"
      - id: "ind-2"
      - id: "ind-3"
    verdicts:
      - indicator_id: "ind-1"
        result: matched
        timestamp: null
      - indicator_id: "ind-2"
        result: matched
        timestamp: null
      - indicator_id: "ind-3"
        result: matched
        timestamp: null
  expected:
    result: exploited
    evaluation_summary:
      matched: 3
      not_matched: 0
      error: 0
      skipped: 0
