# ---------------------------------------------------------------------------
# V-010: All explicitly specified indicator.id values are unique
# ---------------------------------------------------------------------------

- name: "V-010 valid: all indicator IDs unique"
  id: VAL-010a
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools: []
      indicators:
        - id: IND-01
          surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
        - id: IND-02
          surface: tools/list
          target: "tools[*].name"
          pattern:
            contains: "evil"
  expected:
    valid: true

- name: "V-010 invalid: duplicate indicator IDs"
  id: VAL-010b
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools: []
      indicators:
        - id: IND-01
          surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
        - id: IND-01
          surface: tools/list
          target: "tools[*].name"
          pattern:
            contains: "evil"
  expected:
    errors:
      - rule: "V-010"
        path: "attack.indicators[1].id"

# ---------------------------------------------------------------------------
# V-011: All phase.name values are unique
# ---------------------------------------------------------------------------

- name: "V-011 valid: all phase names unique"
  id: VAL-011a
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: setup
            state:
