- name: "V-020 invalid: document uses custom YAML tag"
  id: VAL-020b
  # NOTE: Same SHOULD-level semantics as VAL-020a. SDKs whose parsers
  # expose tag information SHOULD flag this; others MAY skip.
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state: !include "external.yaml"
  expected:
    errors:
      - rule: "V-020"

# ---------------------------------------------------------------------------
# V-027 branch: when predicates in sampling_responses
# ---------------------------------------------------------------------------

- name: "V-027 valid: when predicate key in sampling_responses"
  id: VAL-027c
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools: []
          sampling_responses:
            - when:
                messages[*].role: "user"
              content:
                role: user
                content:
                  - type: text
                    text: "response"
  expected:
    valid: true

- name: "V-027 invalid: when predicate key with wildcard in sampling_responses"
  id: VAL-027d
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools: []
          sampling_responses:
            - when:
                "messages[*].role": "user"
              content:
                role: user
                content:
                  - type: text
                    text: "response"
  expected:
    errors:
      - rule: "V-027"
        path: "attack.execution.state.sampling_responses[0].when.messages[*].role"

# ---------------------------------------------------------------------------
# V-033 branch: sampling_responses catch-all ordering
# ---------------------------------------------------------------------------

- name: "V-033 invalid: sampling_responses with two entries both omitting when"
  id: VAL-033c
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools: []
          sampling_responses:
            - content:
                role: user
                content:
                  - type: text
                    text: "first default"
            - content:
                role: user
                content:
                  - type: text
                    text: "second default"
  expected:
    errors:
      - rule: "V-033"
        path: "attack.execution.state.sampling_responses"

- name: "V-033 invalid: A2A task_responses with two entries both omitting when"
  id: VAL-033d
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: a2a_server
        state:
          agent_card:
            name: "Test"
            description: "Test agent"
            url: "https://example.com"
            version: "1.0"
            protocolVersion: "0.3.0"
            skills: []
            capabilities: {}
            defaultInputModes: ["text/plain"]
            defaultOutputModes: ["text/plain"]
          task_responses:
            - content:
                status: completed
                history:
                  - kind: "message"
                    role: agent
                    parts:
                      - kind: text
                        text: "first"
                    messageId: "msg-001"
            - content:
                status: completed
                history:
                  - kind: "message"
                    role: agent
                    parts:
                      - kind: text
                        text: "second"
                    messageId: "msg-002"
  expected:
    errors:
      - rule: "V-033"
        path: "attack.execution.state.task_responses"

# ---------------------------------------------------------------------------
# V-047: correlation requires indicators
# ---------------------------------------------------------------------------

- name: "V-047 valid: correlation with indicators"
  id: VAL-047a
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools:
            - name: test
              description: "test"
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            condition:
              contains: "malicious"
      correlation:
        logic: all
  expected:
    errors: []

- name: "V-047 invalid: correlation without indicators"
  id: VAL-047b
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools:
            - name: test
              description: "test"
      correlation:
        logic: any
  expected:
    errors:
      - rule: "V-047"
        path: "attack.correlation"
