# ---------------------------------------------------------------------------
# V-008: At most one terminal phase, and it is the last phase
# ---------------------------------------------------------------------------

- name: "V-008 valid: terminal phase is the last phase"
  id: VAL-008a
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: phase-1
            state:
              tools:
                - name: test-tool
                  description: "A test tool"
                  inputSchema:
                    type: object
            trigger:
              event: tools/call
          - name: phase-2
            description: "Terminal phase, no trigger."
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    valid: true

- name: "V-008 invalid: terminal phase is first, non-terminal follows"
  id: VAL-008b
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: phase-1
            state:
              tools:
                - name: test-tool
                  description: "A test tool"
                  inputSchema:
                    type: object
          - name: phase-2
            trigger:
              event: tools/call
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    errors:
      - rule: "V-008"
        path: "attack.execution.phases[0]"

- name: "V-008 invalid: two terminal phases (neither has trigger)"
  id: VAL-008c
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: phase-1
            state:
              tools:
                - name: test-tool
                  description: "A test tool"
                  inputSchema:
                    type: object
            trigger:
              event: tools/call
          - name: phase-2
            description: "First terminal phase."
          - name: phase-3
            description: "Second terminal phase."
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    errors:
      - rule: "V-008"
        path: "attack.execution.phases"

- name: "V-008 valid: single phase with no trigger (terminal-only document)"
  id: VAL-008d
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: only-phase
            state:
              tools:
                - name: test-tool
                  description: "A test tool"
                  inputSchema:
                    type: object
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    valid: true

