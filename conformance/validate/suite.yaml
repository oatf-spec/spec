                source: request
                type: json_path
                selector: "$.tools["
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    errors:
      - rule: "V-015"
        path: "attack.execution.phases[0].extractors[0].selector"

