# ---------------------------------------------------------------------------
# V-013: All regular expressions are syntactically valid RE2
# ---------------------------------------------------------------------------

- name: "V-013 valid: regex pattern is syntactically valid"
  id: VAL-013a
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools: []
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            regex: "id_rsa|passwd"
  expected:
    valid: true

- name: "V-013 invalid: regex with unclosed character class"
  id: VAL-013b
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools: []
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            regex: "[unclosed"
  expected:
    errors:
      - rule: "V-013"
        path: "attack.indicators[0].pattern.regex"

- name: "V-013 invalid: regex in trigger.match predicate is also validated"
  id: VAL-013c
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: phase-1
            state:
              tools: []
            trigger:
              event: tools/call
              match:
                arguments.command:
                  regex: "[unclosed"
          - name: phase-2
            description: "Terminal phase."
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    errors:
      - rule: "V-013"
        path: "attack.execution.phases[0].trigger.match.arguments.command.regex"

