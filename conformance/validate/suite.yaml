# =============================================================================
# OATF Conformance: Validation Test Suite
# Tests SDK validate() entry point against rules from §11.1.
# =============================================================================

# ---------------------------------------------------------------------------
# V-001: oatf field is present and is a supported version string
# ---------------------------------------------------------------------------

- name: "V-001 valid: oatf field present with supported version"
  id: VAL-001a
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools:
            - name: test-tool
              description: "A test tool"
              inputSchema:
                type: object
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    valid: true

- name: "V-001 invalid: oatf field missing"
  id: VAL-001b
  input: |
    attack:
      execution:
        mode: mcp_server
        state:
          tools:
            - name: test-tool
              description: "A test tool"
              inputSchema:
                type: object
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    errors:
      - rule: "V-001"
        path: "oatf"

- name: "V-001 invalid: unsupported version string"
  id: VAL-001c
  input: |
    oatf: "9.9"
    attack:
      execution:
        mode: mcp_server
        state:
          tools:
            - name: test-tool
              description: "A test tool"
              inputSchema:
                type: object
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    errors:
      - rule: "V-001"
        path: "oatf"

# ---------------------------------------------------------------------------
# V-002: oatf field is the first field in the document
# ---------------------------------------------------------------------------

- name: "V-002 valid: oatf is the first field"
  id: VAL-002a
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        state:
          tools:
            - name: test-tool
              description: "A test tool"
              inputSchema:
                type: object
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    valid: true

- name: "V-002 warning: attack appears before oatf"
  id: VAL-002b
  input: |
    attack:
      execution:
        mode: mcp_server
        state:
          tools:
            - name: test-tool
              description: "A test tool"
              inputSchema:
                type: object
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
    oatf: "0.1"
  expected:
    valid: true
    warnings:
      - rule: "W-001"
        path: "oatf"

