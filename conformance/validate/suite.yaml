      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    valid: true

- name: "V-011 invalid: two phases named 'setup'"
  id: VAL-011b
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: setup
            state:
