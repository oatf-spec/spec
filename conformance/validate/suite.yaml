# ---------------------------------------------------------------------------
# V-015: All JSONPath expressions are syntactically valid
# ---------------------------------------------------------------------------

- name: "V-015 valid: well-formed JSONPath expression"
  id: VAL-015b
  input: |
    oatf: "0.1"
    attack:
      execution:
        mode: mcp_server
        phases:
          - name: phase-1
            state:
              tools: []
            extractors:
              - name: tool_name
                source: request
                type: json_path
