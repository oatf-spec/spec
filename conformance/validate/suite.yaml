          - name: setup
            description: "Duplicate name."
      indicators:
        - surface: tools/list
          target: "tools[*].description"
          pattern:
            contains: "test"
  expected:
    errors:
      - rule: "V-011"
        path: "attack.execution.phases[1].name"

# ---------------------------------------------------------------------------
