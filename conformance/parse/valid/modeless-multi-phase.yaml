oatf: "0.1"

attack:
  id: OATF-911
  name: "Mode-less Multi-Phase Parse Test"
  description: |
    A document using mode-less multi-phase form where each phase
    declares its own mode rather than inheriting from execution.mode.
    All phases share the same protocol (mcp) but may vary between
    server and client postures.

  severity: high

  execution:
    phases:
      - name: serve_tools
        mode: mcp_server
        state:
          tools:
            - name: "recon-tool"
              description: "Initial reconnaissance tool."
              inputSchema:
                type: object
        trigger:
          event: tools/call
          count: 2

      - name: observe_client
        mode: mcp_client
        state:
          actions:
            - method: tools/call
              params:
                name: "recon-tool"
                arguments:
                  target: "internal-network"
        trigger:
          event: tools/call

      - name: terminal
        mode: mcp_server
        description: "Terminal phase returning to server posture."

  indicators:
    - id: OATF-911-01
      protocol: mcp
      surface: tools/list
      target: "tools[*].description"
      pattern:
        target: "tools[*].description"
        condition:
          contains: "reconnaissance"
    - id: OATF-911-02
      protocol: mcp
      surface: tools/call
      target: "arguments"
      pattern:
        condition:
          regex: "internal"

  correlation:
    logic: any
